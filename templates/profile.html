<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>{{ user.username }} </h1>
<img src="{{ user.profile.profile_image.url }}" style="width: 100px; height: 100px;">

<a href="{% url 'change_password' %}">Parolni yangilash</a><br>
<a href="{% url 'update_profile' %}">Profilni yangilash</a>
</body>
</html>
